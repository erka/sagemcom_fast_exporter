name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: set up Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          target: aarch64-unknown-linux-musl
      - name: install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools
      - name: build
        run: cargo build --release --locked --target aarch64-unknown-linux-musl
      - name: package
        run: |
          mkdir -p release
          sha256sum target/aarch64-unknown-linux-musl/release/sagemcom-fast-exporter > release/checksums.txt
          tar -czvf release/sagemcom-fast-exporter-linux-arm64.tar.gz -C target/aarch64-unknown-linux-musl/release sagemcom-fast-exporter
          cd release
          sha256sum *.tar.gz >> checksums.txt
      - name: create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            release/*.tar.gz
            release/checksums.txt
          generate_release_notes: false
          draft: true
